http:
  port: nest_server_port
  apiPrefix: 'api/v1'

brello:
  environment: 'dev' # dev, uat, prod

app:
  # Public URL of the webapp; used to build the invite link sent to new employees.
  publicUrl: 'http://localhost:5173'

auth:
  JWT_SECRET: jwtsecretstring
  JWT_REFRESH_SECRET: jwtrefreshsecretstring
  JWT_ACCESS_EXPIRATION: '15m'
  JWT_REFRESH_EXPIRATION: '7d'
  ENC_KEY: enc_key
  IV: enc_iv

session:
  expirationDays: 7

cookie:
  refreshTokenName: 'refresh_token'
  httpOnly: true
  secure: true             # true for HTTPS, false for local HTTP
  sameSite: 'strict'
  path: '/api/v1/auth'
  maxAgeDays: 7
  domain: ''               # e.g. '.brello.co.in'

otp:
  expirationMinutes: 10
  maxAttempts: 5

db:
  postgres:
    HOST: 'host'
    PORT: port
    DB_USER: 'username'
    DB_PASSWORD: 'password'
    DB_NAME: 'dbname'
    DB_SCHEMA: 'brello'

smtp:
  host: 'smtp.gmail.com'
  port: 587
  secure: false
  user: 'your-email@gmail.com'
  password: 'your-app-password'
  from: 'noreply@brello.com'

storage:
  provider: 'S3'

billing:
  GST_RATE: 18
  GRACE_PERIOD_DAYS: 7
  INVOICE_DUE_DAYS: 7
  RAZORPAY_KEY_ID: 'rzp_test_xxxxxxxxxxxx'
  RAZORPAY_KEY_SECRET: 'xxxxxxxxxxxx'
  RAZORPAY_WEBHOOK_SECRET: 'whsec_xxxxxxxxxxxx'
