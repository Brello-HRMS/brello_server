http:
  port: nest_server_port
  apiPrefix: 'api/v1'

brello:
  environment: 'dev' # dev, uat, prod

auth:
  JWT_SECRET: jwtsecretstring
  JWT_REFRESH_SECRET: jwtrefreshsecretstring
  JWT_ACCESS_EXPIRATION: '15m'
  JWT_REFRESH_EXPIRATION: '7d'
  ENC_KEY: enc_key
  IV: enc_iv

session:
  expirationDays: 7

otp:
  expirationMinutes: 10
  maxAttempts: 5

db:
  postgres:
    HOST: 'host'
    PORT: port
    DB_USER: 'username'
    DB_PASSWORD: 'password'
    DB_NAME: 'dbname'
    DB_SCHEMA: 'brello'

smtp:
  host: 'smtp.gmail.com'
  port: 587
  secure: false
  user: 'your-email@gmail.com'
  password: 'your-app-password'
  from: 'noreply@brello.com'
